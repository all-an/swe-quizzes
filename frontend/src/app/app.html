<div class="app-shell">
  <header class="topbar">
    <a class="brand" routerLink="/">SWE Quizzes</a>
    <nav class="nav-actions">
      @if (auth.isLoggedIn()) {
        <a class="nav-link" routerLink="/my-quizzes">My Quizzes</a>
        @if (auth.isAdmin()) {
          <a class="nav-link" routerLink="/admin">Admin</a>
        }
        <button class="nav-button" type="button" (click)="logout()">Logout</button>
      } @else {
        <a class="nav-link" routerLink="/register">Register</a>
        <button class="nav-button" type="button" (click)="login()">Login</button>
      }
    </nav>
  </header>
  <router-outlet />
  <footer class="footer">
    <a class="github-link" href="https://github.com/all-an/swe-quizzes" target="_blank" rel="noopener noreferrer" aria-label="GitHub project">

</div>
