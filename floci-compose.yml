services:
  floci:
    image: floci/floci:latest
    ports:
      - "4566:4566"
      # ALB listener for the backend — the browser reaches the API at http://localhost:8081.
      # Floci binds listener sockets on its own host, so the port must be published here.
      - "8081:8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock