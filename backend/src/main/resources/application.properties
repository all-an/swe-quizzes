spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/swequizzes}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:swequizzes}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:swequizzes}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Origins allowed to call /api (the S3-hosted frontend in production, the dev server locally).
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://swe-quizzes-frontend.s3.localhost.floci.io:4566,http://localhost:4200}
